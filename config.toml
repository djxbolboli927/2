[trading]
min_amount_sol = 0.001
max_amount_sol = 0.1
step_sol = 0.0002
# حداقل سود ناخالص (lamport) برای عبور از Stage 1.
# فقط روی تعداد profitable و ارسال به swap_instructions تأثیر دارد.
# خروجی نهایی on-chain همچنان ورودی + 10000 لمپرت باقی می‌ماند.
# مثال: 6600 = فقط فرصت‌هایی که هزینه‌ها را پوشش می‌دهند
#        100000 = فقط فرصت‌های با سود بالا
