[performance]
# تعداد worker thread های tokio برای ربات. در سرور 16 هسته‌ای،
# 3 هسته برای ربات و 13 هسته برای متیس توصیه می‌شود.
threads = 4
quote_timeout_ms = 200
# CU limit بر اساس تعداد هاپ: [2 hops, 3 hops, 4 hops, 5 hops, 6 hops]
cu_limits = [170000, 220000, 280000, 330000, 380000]
# حداکثر درخواست‌های همزمان به Metis در هر chunk.
# 256 تا = نصف بار قبلی (512) تا متیس پهنای باند کافی برای swap_instructions داشته باشد
max_concurrent_quotes = 256
# حداکثر کارگرهای همزمان مرحله محاسبات (merge + شلیک swap_instructions).
# با fire-and-forget هر کارگر فقط چند میکروثانیه اسلات را نگه می‌دارد، پس
# می‌توان این عدد را بالا برد تا گلوگاه بودن مرحله محاسبات قطعی رد شود.
# اگر با عدد بالا jito_sent ثابت ماند ولی rate_lim زیاد شد ⇒ گلوگاه واقعی
# rate limiter جیتوست، نه کارگرها.
calc_workers = 64
# حداکثر سن (ms) یک فرصت در صف انتظار ارسال به Jito.
# اگر تا این مدت slot آزاد نشد → دور ریخته می‌شود (stale).
# بیشتر = فرصت‌های قدیمی‌تر هم ارسال می‌شوند ولی احتمال landing کمتر است.
queue_max_age_ms = 5000
# اگر سرور 16 هسته دارد: متیس روی 0-11، ربات روی 12-15
bot_cpu_cores = [12,13,14,15,28,29,30,31]

[simulation]
# LiteSVM pre-flight: قبل از ارسال هر باندل به Jito، همان tx را محلی روی
# بایت‌کد واقعی DEXها اجرا می‌کنیم. اگر revert شد یا سود نداشت، ارسال لغو
# می‌شود و base fee ذخیره می‌شود.
#
# منبع داده‌ی sim = همان gRPC شیفت که Metis هم می‌خواند (یک اتصال جدا،
# هیچ سربار متقابلی با Metis ندارد).
enabled = true
so_dir = "/root/s/so"
dex_dir = "/root/s/metis/1"
workers = 8
prefetch_pools_per_second = 5
allow_hot_path_rpc_fetch = false
enabled_dexes = [
    "meteora_damm_v2",
    "meteora_dlmm",
    "Raydium_Concentrated_Liquidity",
    "raydium_clmm",
    "raydium_cpmm",
    "whirlpool",
    "pancakeswap",
    "manifest",
    "solfi",
    "solfi_v2",
    "tessera_v",
    "goonfi_v2",
    "invariant",
    "1dex",
    "alphaq",
    "aquifer",
    "byreal_clmm",
    "bonkswap",
    "fusion_amm",
    "meteora_pools",
    "mercurial_stable_swap",
    "zerofi",
]
# fail_closed=true  (امن)  : اگر sim خطا داد ⇒ ارسال نکن
# fail_closed=false (رول‌اوت) : اگر sim خطا داد ⇒ فقط log بزن و بفرست
fail_closed = true

[jito_grpc]
# مسیر دوم ارسال باندل از طریق SearcherService gRPC جیتو با کیف whitelist.
# کیف whitelist شده ⇒ rate limit جیتو = 5 req/s per region (8 ریجن × 5 = 40/sec).
# لیمیت داخلی ربات (max_bundles_per_second) از این عدد بسیار پایین‌تر است،
# پس هیچ‌وقت به سقف جیتو نمی‌خوریم.
#
# اگر auth یک ریجن fail کرد، همان ریجن به no-auth mode می‌رود (1 req/s)،
# بقیه ریجن‌ها دست‌نخورده با 5/sec ادامه می‌دهند.
#
# مجموع throughput = jito.max_bundles_per_second + jito_grpc.max_bundles_per_second
# (در تنظیمات فعلی: 5 + 5 = 10 باندل در ثانیه).
#
# تکراری ارسال نمی‌شود: dispatcher اول REST limiter را می‌چکد؛ اگر جا داشت
# ⇒ REST، وگرنه gRPC limiter را امتحان می‌کند؛ اگر هر دو پر بودند ⇒ فرصت
# drop می‌شود (jito_rate_limited++).
enabled = true
endpoints = [
    "https://amsterdam.mainnet.block-engine.jito.wtf",
    "https://dublin.mainnet.block-engine.jito.wtf",
    "https://frankfurt.mainnet.block-engine.jito.wtf",
    "https://london.mainnet.block-engine.jito.wtf",
    "https://ny.mainnet.block-engine.jito.wtf",
    "https://slc.mainnet.block-engine.jito.wtf",
    "https://singapore.mainnet.block-engine.jito.wtf",
    "https://tokyo.mainnet.block-engine.jito.wtf",
]
# این ولت توسط جیتو whitelist شده — هیچ دارایی‌ای نگه نمی‌دارد و هیچ
# تراکنشی امضا نمی‌کند. فقط برای احراز هویت اتصال gRPC استفاده می‌شود.
auth_keypair = "/root/c/wallet/grpc.json"
max_bundles_per_second = 5

[template_cache]
# Tier-1: route_signature دقیق → patch amounts → بدون Metis call
# Tier-2: hop-pair index (هر دو pool دیده شده) → patch amounts → بدون Metis call
# Tier-3: fallback به /swap-instructions + ذخیره template برای دفعات بعد
save_new = true
serve_route = true
serve_from_metis = true
