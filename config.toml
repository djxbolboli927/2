tip_max_lamports = 1000000
tip_profit_percent = 0.50
# ریت لیمیت فقط سمت ما: 5 باندل در ثانیه برای کل loop
# (هر باندل به ۸ endpoint می‌رود که هر کدام خودش 5/sec limit دارد)
