# GoonFi V2 pool template — copy this file, rename it (e.g. hype_usdc.toml),
# fill in the addresses from Solscan, and delete this template comment.
#
# How to find accounts for a pool:
#   1. Find any real swap transaction for this pair on Solscan
#   2. Look at the "Input Accounts" section of the GoonFi V2: Swap instruction
#   3. Fill in the pubkeys below (ignore user accounts and program accounts)
#
# Account layout for every GoonFi V2 swap instruction:
#   #1  User (signer, dynamic — skip)
#   #2  Market state           → market
#   #3  User Token Account A   (dynamic — skip)
#   #4  User Token Account B   (dynamic — skip)
#   #5  Pool Token Account A   → vault_a   ← changes every trade (live sub)
#   #6  Pool Token Account B   → vault_b   ← changes every trade (live sub)
#   #7  Token A mint           → mint_a
#   #8  Token B mint           → mint_b
#   #9  Pool-specific account  → extra[0]
#   #10 Protocol global acct   → extra[1]  (BNrK9LpEn65QA4TyBLVSMdngW3XHj3xLfFPwGdCBv8wV)
#   #11 Sysvar: Instructions   (built-in — skip)
#   #12 Token Program          (built-in — skip)
#   #13 Token Program          (built-in — skip)

# Human-readable label shown in logs
name = "TOKEN_A/TOKEN_B"

# Market state account — owned by GoonFi program, auto-streamed via Yellowstone
# owner-filter.  Listed here so prefetch warms it before the first sim.
market = "MARKET_PUBKEY_HERE"

# Pool token vaults — owned by SPL Token program, NOT in the Yellowstone
# owner-filter.  These are subscribed individually for live updates so the
# simulator always has the current pool balances.
vault_a = "POOL_TOKEN_ACCOUNT_A_PUBKEY"   # Pool 1 on Solscan
vault_b = "POOL_TOKEN_ACCOUNT_B_PUBKEY"   # Pool 2 on Solscan

# Token mints — static, rarely change.  Usually already warm from tokens.txt
# but listed here for completeness.
mint_a = "TOKEN_A_MINT_PUBKEY"
mint_b = "TOKEN_B_MINT_PUBKEY"

# Additional static accounts from the instruction (#9, #10 on Solscan).
# These are pre-fetched once at startup; if owned by GoonFi they are also
# auto-streamed via the owner-filter and will be updated automatically.
extra = [
    "ACCOUNT_9_PUBKEY",
    "ACCOUNT_10_PUBKEY",   # BNrK9LpEn65QA4TyBLVSMdngW3XHj3xLfFPwGdCBv8wV (global)
]
